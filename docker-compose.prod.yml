services:
  proxy:
    image: caddy:2.8-alpine
    container_name: similia_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: "${APP_DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend-nginx
    networks:
      - similia_network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: similia_frontend
    restart: unless-stopped
    networks:
      - similia_network

  backend-nginx:
    image: nginx:1.27-alpine
    container_name: similia_backend_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - similia_network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: similia_backend
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME}"
      APP_ENV: "${APP_ENV}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG}"
      APP_URL: "${APP_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
      TRUSTED_PROXIES: "*"

      LOG_CHANNEL: stack
      LOG_LEVEL: "${LOG_LEVEL}"

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: "${POSTGRES_DB}"
      DB_USERNAME: "${POSTGRES_USER}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"

      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      SESSION_DOMAIN: "${SESSION_DOMAIN}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE}"
      SESSION_SAME_SITE: lax

      SANCTUM_STATEFUL_DOMAINS: "${SANCTUM_STATEFUL_DOMAINS}"

      AI_SERVICE_URL: http://ai-service:8001
      AI_SERVICE_TIMEOUT: 30
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - similia_network

  backend-queue:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: similia_backend_queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120 --max-time=3600
    environment:
      APP_NAME: "${APP_NAME}"
      APP_ENV: "${APP_ENV}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG}"
      APP_URL: "${APP_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
      TRUSTED_PROXIES: "*"

      LOG_CHANNEL: stack
      LOG_LEVEL: "${LOG_LEVEL}"

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: "${POSTGRES_DB}"
      DB_USERNAME: "${POSTGRES_USER}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"

      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      SESSION_DOMAIN: "${SESSION_DOMAIN}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE}"
      SESSION_SAME_SITE: lax

      SANCTUM_STATEFUL_DOMAINS: "${SANCTUM_STATEFUL_DOMAINS}"

      AI_SERVICE_URL: http://ai-service:8001
      AI_SERVICE_TIMEOUT: 30
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - similia_network

  backend-scheduler:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: similia_backend_scheduler
    restart: unless-stopped
    command: sh -lc "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    environment:
      APP_NAME: "${APP_NAME}"
      APP_ENV: "${APP_ENV}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG}"
      APP_URL: "${APP_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
      TRUSTED_PROXIES: "*"

      LOG_CHANNEL: stack
      LOG_LEVEL: "${LOG_LEVEL}"

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: "${POSTGRES_DB}"
      DB_USERNAME: "${POSTGRES_USER}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"

      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      SESSION_DOMAIN: "${SESSION_DOMAIN}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE}"
      SESSION_SAME_SITE: lax

      SANCTUM_STATEFUL_DOMAINS: "${SANCTUM_STATEFUL_DOMAINS}"

      AI_SERVICE_URL: http://ai-service:8001
      AI_SERVICE_TIMEOUT: 30
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - similia_network

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    container_name: similia_ai_service
    restart: unless-stopped
    networks:
      - similia_network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: similia_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - similia_network

  redis:
    image: redis:7-alpine
    container_name: similia_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - similia_network

networks:
  similia_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  caddy_data:
  caddy_config:
